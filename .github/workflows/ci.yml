name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    # Real Postgres so the Prisma schema is validated against a live database.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecommerce"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecommerce?schema=public
      JWT_ACCESS_SECRET: ci-secret-ci-secret-ci-secret-ci-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      # Version is taken from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @app/shared build

      - name: Generate Prisma client
        run: pnpm --filter @app/api prisma:generate

      - name: Apply database schema
        run: pnpm --filter @app/api prisma:push

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm --filter @app/api test

      - name: E2E tests
        run: pnpm --filter @app/api test:e2e

      - name: Build
        run: pnpm build
