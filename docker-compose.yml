# Local PostgreSQL for evaluators who prefer not to use a managed (Neon) DB.
# Usage:
#   docker compose up -d
#   # then point DATABASE_URL at it (already the default in .env.example):
#   #   postgresql://postgres:postgres@localhost:5432/ecommerce?schema=public
services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ecommerce']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
